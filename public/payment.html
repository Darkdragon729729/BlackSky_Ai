<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wallet - Black Sky AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-logo">💳 Premium Wallet</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="chat.html">Chat</a>
    </nav>
</header>

<main class="container small-container">
    <div class="card-wrapper">
        <div class="wallet-card">
            <h2>Wallet Balance</h2>
            <h1 id="balance">₹0.00</h1>
            <p>Maintain your system balance token pools to prevent service interruption blocks.</p>
        </div>

        <div class="amount-card">
            <h3>Select Top-Up Amount</h3>
            <div class="amount-buttons">
                <button onclick="selectAmount(10)">₹10</button>
                <button onclick="selectAmount(30)">₹30</button>
                <button onclick="selectAmount(50)">₹50</button>
                <button onclick="selectAmount(80)">₹80</button>
                <button onclick="selectAmount(100)">₹100</button>
            </div>

            <div class="input-container">
                <input type="number" id="customAmount" placeholder="Or enter custom amount">
            </div>

            <button id="payBtn" class="action-btn-main">Recharge Now</button>
        </div>
    </div>
</main>

<script>
let selectedAmount = 0;

function selectAmount(amount) {
    selectedAmount = amount;
    document.getElementById("customAmount").value = amount;
    
    // Visually toggle active states
    const buttons = document.querySelectorAll('.amount-buttons button');
    buttons.forEach(btn => btn.classList.remove('active-btn'));
    event.target.classList.add('active-btn');
}

document.getElementById("payBtn").onclick = function () {
    const custom = document.getElementById("customAmount").value;
    if (custom) {
        selectedAmount = Number(custom);
    }

    if (!selectedAmount || selectedAmount < 1) {
        alert("Please select or enter a valid amount.");
        return;
    }

    alert("Selected Amount: ₹" + selectedAmount);
};
</script>

</body>
</html>
